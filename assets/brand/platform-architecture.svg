<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <title id="title">Guarded Continuation Checker platform architecture</title>
  <desc id="desc">Firmware and RTL sources enter an authenticated bounded model. Guarded Continuation Checker governs resources and selects either CQ-SAT specialisation or an exact fallback without trial solving. Both routes create canonical evidence that a separate verifier checks before returning a bounded safe result, a replayable unsafe trace, or a refusal with no answer.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06182F"/>
      <stop offset="0.55" stop-color="#081F3D"/>
      <stop offset="1" stop-color="#0B294A"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A9A92" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#08A9F0" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="fallback" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6956D9" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#08A9F0" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="evidence" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0A9A92"/>
      <stop offset="0.55" stop-color="#08A9F0"/>
      <stop offset="1" stop-color="#6956D9"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000A14" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#45D2C8"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5BC8F5"/>
    </marker>
    <style>
      .sans { font-family: Arial, Helvetica, sans-serif; }
      .mono { font-family: Menlo, Monaco, Consolas, monospace; }
      .eyebrow { font-size: 15px; font-weight: 750; letter-spacing: 2.5px; }
      .label { font-size: 25px; font-weight: 760; }
      .body { font-size: 17px; font-weight: 500; }
      .small { font-size: 14px; font-weight: 600; }
      .muted { fill: #B9CCDA; }
      .white { fill: #FFFFFF; }
      .stroke { stroke: #FFFFFF; stroke-opacity: 0.16; }
    </style>
  </defs>

  <rect width="1600" height="1020" rx="36" fill="url(#canvas)"/>
  <rect width="1600" height="1020" rx="36" fill="url(#grid)"/>
  <circle cx="1470" cy="110" r="230" fill="#08A9F0" opacity="0.055"/>
  <circle cx="100" cy="900" r="260" fill="#6956D9" opacity="0.05"/>

  <g class="sans">
    <text x="70" y="62" class="eyebrow" fill="#45D2C8">GUARDED CONTINUATION CHECKER</text>
    <text x="70" y="105" class="white" font-size="34" font-weight="780">Proof-carrying bounded verification, powered by CQ-SAT</text>
    <text x="1530" y="66" text-anchor="end" class="mono small" fill="#8EADC2">PLATFORM ARCHITECTURE</text>

    <!-- Inputs -->
    <g filter="url(#shadow)">
      <rect x="70" y="150" width="285" height="112" rx="22" fill="#102C49" class="stroke"/>
      <rect x="375" y="150" width="285" height="112" rx="22" fill="#102C49" class="stroke"/>
      <rect x="680" y="150" width="285" height="112" rx="22" fill="#102C49" class="stroke"/>
    </g>
    <g class="mono eyebrow" fill="#8EADC2">
      <text x="95" y="181">INPUT 01</text><text x="400" y="181">INPUT 02</text><text x="705" y="181">INPUT 03</text>
    </g>
    <g class="white label">
      <text x="95" y="218">Firmware</text><text x="400" y="218">RTL designs</text><text x="705" y="218">Transition models</text>
    </g>
    <g class="muted body">
      <text x="95" y="246">C / C++ semantic slices</text><text x="400" y="246">Verilog / SystemVerilog</text><text x="705" y="246">BTOR2 / binary AIGER</text>
    </g>

    <rect x="1010" y="150" width="520" height="112" rx="22" fill="#0D2945" stroke="#45D2C8" stroke-opacity="0.40"/>
    <text x="1040" y="181" class="mono eyebrow" fill="#45D2C8">REVIEWED OBLIGATION</text>
    <text x="1040" y="218" class="white label">Property boundary</text>
    <text x="1040" y="246" class="muted body">assumptions · reset · horizon · named bad state</text>

    <!-- Authentication boundary -->
    <path d="M215 262V300M518 262V300M823 262V300M1270 262V300" fill="none" stroke="#5BC8F5" stroke-width="3" marker-end="url(#arrow-cyan)"/>
    <rect x="70" y="302" width="1460" height="104" rx="24" fill="#F4F8FA"/>
    <rect x="70" y="302" width="12" height="104" rx="6" fill="url(#evidence)"/>
    <text x="110" y="338" class="eyebrow" fill="#0A7772">AUTHENTICATED MODEL BOUNDARY</text>
    <text x="110" y="375" class="label" fill="#081F3D">Source identity + canonical model + ordered query contract</text>
    <g class="mono small" fill="#426078">
      <text x="970" y="341">SOURCE DIGEST</text><text x="1152" y="341">MODEL DIGEST</text><text x="1336" y="341">SCHEMA VERSION</text>
      <text x="970" y="373">bound</text><text x="1152" y="373">recomputed</text><text x="1336" y="373">fail closed</text>
    </g>

    <!-- GCC orchestration -->
    <path d="M800 406V445" fill="none" stroke="#45D2C8" stroke-width="4" marker-end="url(#arrow-teal)"/>
    <rect x="250" y="450" width="1100" height="112" rx="28" fill="#0D2945" stroke="#5BC8F5" stroke-opacity="0.34" stroke-width="2"/>
    <text x="290" y="486" class="eyebrow" fill="#5BC8F5">GCC ORCHESTRATION · OUTSIDE THE SOLVER TRUST BOUNDARY</text>
    <text x="290" y="527" class="white label">Preflight governance</text>
    <text x="580" y="527" class="white label">Static route gate</text>
    <text x="862" y="527" class="white label">Atomic publication</text>
    <text x="1148" y="527" class="white label">Observability</text>
    <g class="muted small">
      <text x="290" y="549">bytes · work · memory</text><text x="580" y="549">no trial solving</text><text x="862" y="549">no clobber · no partial result</text><text x="1148" y="549">timing cannot select answers</text>
    </g>

    <!-- Routes -->
    <path d="M620 562V599H435V628" fill="none" stroke="#45D2C8" stroke-width="4" marker-end="url(#arrow-teal)"/>
    <path d="M980 562V599H1165V628" fill="none" stroke="#A99CF8" stroke-width="4" marker-end="url(#arrow-cyan)"/>
    <rect x="145" y="628" width="590" height="184" rx="30" fill="url(#core)" stroke="#45D2C8" stroke-width="2"/>
    <rect x="865" y="628" width="590" height="184" rx="30" fill="url(#fallback)" stroke="#A99CF8" stroke-width="2"/>
    <text x="185" y="668" class="eyebrow" fill="#45D2C8">SPECIALISED ROUTE</text>
    <text x="185" y="711" class="white" font-size="31" font-weight="790">CQ-SAT exact composition</text>
    <text x="185" y="748" class="muted body">Merge only equivalent residual behaviour.</text>
    <text x="185" y="777" class="muted body">Reuse checked members. Recover complete traces.</text>
    <g transform="translate(680 700) scale(.65)">
      <path d="M-95 -18H-62L-30 10M-95 10H-30M-95 38H-62L-30 10" fill="none" stroke="#5BC8F5" stroke-width="5" stroke-linecap="round"/>
      <circle cx="-16" cy="10" r="15" fill="#081F3D" stroke="#45D2C8" stroke-width="5"/>
      <path d="M0 10H62" stroke="#45D2C8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-teal)"/>
    </g>

    <text x="905" y="668" class="eyebrow" fill="#B8AEFF">EXACT FALLBACK ROUTE</text>
    <text x="905" y="711" class="white" font-size="31" font-weight="790">Portfolio backends</text>
    <text x="905" y="748" class="muted body">Persistent CDCL · bitblast · explicit state</text>
    <text x="905" y="777" class="muted body">Unsupported shapes are refused or checked exactly.</text>
    <g transform="translate(1345 716)" fill="none" stroke="#B8AEFF" stroke-width="4">
      <rect x="-78" y="-37" width="55" height="55" rx="10"/><rect x="-8" y="-37" width="55" height="55" rx="10"/><rect x="-43" y="34" width="55" height="55" rx="10"/>
      <path d="M-23 -9H-8M-51 18L-25 34M19 18L-2 34"/>
    </g>

    <!-- Evidence convergence -->
    <path d="M435 812V846H770" fill="none" stroke="#45D2C8" stroke-width="4" marker-end="url(#arrow-teal)"/>
    <path d="M1165 812V846H830" fill="none" stroke="#A99CF8" stroke-width="4" marker-end="url(#arrow-cyan)"/>
    <rect x="430" y="840" width="740" height="82" rx="25" fill="#FFFFFF"/>
    <rect x="430" y="840" width="740" height="8" rx="4" fill="url(#evidence)"/>
    <text x="470" y="879" class="eyebrow" fill="#426078">CANONICAL EVIDENCE ARTIFACT</text>
    <text x="470" y="906" class="body" fill="#081F3D">model + route + proof or witness + resource policy + integrity digest</text>

    <!-- Verifier and results -->
    <path d="M1170 881H1230" stroke="#5BC8F5" stroke-width="4" marker-end="url(#arrow-cyan)"/>
    <rect x="1240" y="840" width="290" height="82" rx="25" fill="#102C49" stroke="#5BC8F5" stroke-width="2"/>
    <text x="1270" y="874" class="eyebrow" fill="#5BC8F5">SEPARATE CHECKER</text>
    <text x="1270" y="905" class="white body">recompute · prove · replay</text>

    <path d="M1385 922V936H250V948M630 936V948M1010 936V948" fill="none" stroke="#5BC8F5" stroke-opacity="0.70" stroke-width="2.5"/>
    <rect x="70" y="950" width="360" height="48" rx="16" fill="#0A9A92"/>
    <rect x="450" y="950" width="360" height="48" rx="16" fill="#15547A"/>
    <rect x="830" y="950" width="360" height="48" rx="16" fill="#4D428F"/>
    <rect x="1210" y="950" width="320" height="48" rx="16" fill="#102C49" stroke="#FFFFFF" stroke-opacity="0.20"/>
    <g class="mono small white" text-anchor="middle">
      <text x="250" y="980">SAFE · BOUNDED</text>
      <text x="630" y="980">UNSAFE · REPLAYABLE TRACE</text>
      <text x="1010" y="980">REFUSED · NO ANSWER</text>
      <text x="1370" y="980">RUST API · CLI · CI</text>
    </g>
  </g>
</svg>
