name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change scope
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.scope.outputs.full }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Classify change scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "full=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch requests the complete matrix."
            exit 0
          fi

          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "full=false" >> "$GITHUB_OUTPUT"
            echo "Protected master changes were validated before merge."
            exit 0
          fi

          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=ACMR "$BASE_SHA...$HEAD_SHA"
          )
          full=false
          for path in "${changed_files[@]}"; do
            case "$path" in
              README.md|CRATE_README.md|CHANGELOG.md|LICENSE|docs/*|assets/brand/*)
                ;;
              *)
                full=true
                ;;
            esac
          done

          printf '%s\n' "${changed_files[@]}"
          echo "full=$full" >> "$GITHUB_OUTPUT"

  documentation:
    name: Documentation
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Check repository writing style
        run: scripts/check-style.sh
      - name: Check changed lines for whitespace errors
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"

  certified-equivalent-evidence:
    needs: changes
    if: github.event_name == 'workflow_dispatch' && needs.changes.outputs.full == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - name: Validate and run hosted evidence comparison
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            bison flex gawk libffi-dev libreadline-dev pkg-config shellcheck \
            tcl-dev zlib1g-dev
          shellcheck -s bash \
            scripts/run-certified-evidence-hosted-v1.sh \
            scripts/qualify-certifaiger-v1.sh \
            scripts/qualify-ric3-v1.sh \
            scripts/certified-evidence-container-v1.sh \
            scripts/benchmark-certified-evidence-v1.sh \
            scripts/benchmark-gcc-proof-runlim-v1.sh \
            scripts/test-composed-witness-baseline-v1.sh \
            scripts/benchmark-opentitan-dual-timer-composed-witness-v1.sh \
            scripts/benchmark-caliptra-wdt-composed-witness-v1.sh \
            scripts/benchmark-opentitan-dual-timer-resources-v1.sh \
            scripts/opentitan-dual-timer-resource-container-v1.sh \
            scripts/benchmark-changing-plant-composed-witness-v1.sh \
            scripts/build-roalogic-plic-revision-aiger-v1.sh \
            scripts/benchmark-roalogic-plic-closest-baseline-v1.sh \
            scripts/test-certified-evidence-hostile-v1.sh
          shellcheck -s sh \
            scripts/build-opentitan-aon-dual-timer-aiger.sh \
            scripts/build-caliptra-wdt-aiger-v1.sh
          scripts/run-certified-evidence-hosted-v1.sh /tmp/evidence-results
          cat /tmp/evidence-results/*.csv
      - name: Retain hosted comparison evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: certified-equivalent-evidence-amd64
          path: /tmp/evidence-results/*
          if-no-files-found: error
          retention-days: 14

  test:
    needs: changes
    if: needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check repository writing style
        run: scripts/check-style.sh
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          components: rustfmt, clippy
      - name: Install formal RTL tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes yosys z3 shellcheck
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: |
          cargo clippy --all-targets
          cargo clippy --features research-qatq-transport \
            --test qatq_transport_api -- -D warnings
          cargo clippy --features research-qatq-transport \
            --example qatq_transport_qualification -- -D warnings
      - name: Check frozen production support profile
        run: |
          shellcheck -s bash scripts/check-production-support-profile-v1.sh
          cargo clippy --locked --bin guarded-continuation-checker \
            --features production-firmware -- -D warnings
          cargo build --release --locked --features production-firmware
          if cargo tree --locked --features production-firmware | grep -Eq '(^| )qatq v'; then
            echo "production-firmware unexpectedly includes QatQ"
            exit 1
          fi
          scripts/check-production-support-profile-v1.sh \
            target/release/guarded-continuation-checker
      - name: Test
        run: cargo test --locked
      - name: Package and install exact crate payload
        run: scripts/test-crate-package-v1.sh
      - name: Reproduce composed-witness model exports
        run: scripts/test-composed-witness-model-exports-v1.sh
      - name: Check BTOR2 baseline scripts
        run: |
          shellcheck -s bash scripts/build-opentitan-aon-watchdog-btor2.sh
          shellcheck -s bash \
            scripts/build-caliptra-wdt-btor2-v1.sh \
            scripts/run-caliptra-wdt-word-probe-v2.sh \
            scripts/build-caliptra-wdt-word-input-btor2-v1.sh \
            scripts/run-caliptra-wdt-word-input-acceptance-v1.sh \
            scripts/build-roalogic-plic-gateway-btor2-v1.sh \
            scripts/run-roalogic-plic-gateway-acceptance-v1.sh \
            scripts/build-roalogic-plic-gateway-constrained-btor2-v1.sh \
            scripts/run-roalogic-plic-gateway-constrained-acceptance-v1.sh \
            scripts/build-roalogic-plic-revision-component-v1.sh \
            scripts/run-roalogic-plic-revision-reuse-v1.sh \
            scripts/benchmark-roalogic-plic-revision-resources-v1.sh \
            scripts/benchmark-opentitan-dual-timer-composed-witness-v1.sh \
            scripts/benchmark-caliptra-wdt-composed-witness-v1.sh \
            scripts/benchmark-opentitan-dual-timer-resources-v1.sh \
            scripts/opentitan-dual-timer-resource-container-v1.sh \
            scripts/benchmark-qatq-transport-v1.sh \
            scripts/benchmark-opentitan-pwm-single-container-baseline-v1.sh \
            scripts/run-opentitan-pwm-maintained-producer-container-v1.sh \
            scripts/run-opentitan-pwm-maintained-checker-container-v1.sh \
            scripts/run-opentitan-pwm-single-container-matrix-v1.sh \
            scripts/check-opentitan-pwm-single-container-results-v1.sh \
            scripts/test-crate-package-v1.sh
          shellcheck -s sh \
            scripts/build-opentitan-aon-dual-timer-aiger.sh \
            scripts/build-caliptra-wdt-aiger-v1.sh \
            scripts/test-btor2tools-baseline.sh \
            scripts/test-bitwuzla-phase-baseline.sh \
            scripts/run-opentitan-aon-watchdog-acceptance.sh \
            scripts/run-opentitan-aon-predicate-set-acceptance.sh \
            scripts/run-opentitan-aon-dual-timer-probe.sh \
            scripts/run-opentitan-aon-dual-timer-acceptance.sh \
            scripts/run-btor2-search-cohort.sh \
            scripts/run-btor2-region-cohort.sh \
            scripts/run-btor2-motion-cohort.sh \
            scripts/run-btor2-motion-self-service-acceptance.sh \
            scripts/run-btor2-motion-cost.sh \
            scripts/run-btor2-braking-cohort.sh \
            scripts/run-btor2-braking-self-service-acceptance.sh \
            scripts/run-btor2-braking-cost.sh \
            scripts/run-btor2-component-cohort.sh \
            scripts/run-btor2-component-self-service-acceptance.sh \
            scripts/run-btor2-component-cost.sh \
            scripts/run-btor2-component-batch-acceptance.sh \
            scripts/run-btor2-component-reuse-benchmark.sh \
            scripts/test-public-washing-controller-oracle.sh \
            scripts/test-public-washing-controller-physical-oracle.sh \
            scripts/run-controller-mtbdd-self-service-acceptance.sh \
            scripts/benchmark-controller-mtbdd-process-resources.sh \
            scripts/run-controller-plant-portfolio-acceptance.sh \
            scripts/run-controller-plant-resource-acceptance.sh \
            scripts/benchmark-controller-plant-portfolio-phases.sh \
            scripts/benchmark-controller-proof-mtbdd-plant.sh \
            scripts/run-controller-proof-mtbdd-self-service-acceptance.sh \
            scripts/run-controller-split-resource-acceptance.sh \
            scripts/check-controller-split-compatibility-v1.sh \
            scripts/benchmark-controller-split-process-resources.sh \
            scripts/benchmark-btor2-channel-property-process-resources-v1.sh \
            scripts/benchmark-btor2-channel-trace-process-resources-v1.sh \
            scripts/benchmark-controller-proof-mtbdd-process.sh \
            scripts/benchmark-controller-proof-mtbdd-resources.sh \
            scripts/benchmark-controller-proof-mtbdd-maintained-baseline.sh
      - name: Check retained certified evidence
        run: |
          shellcheck -s bash scripts/check-certified-evidence-retained-v1.sh
          scripts/check-certified-evidence-retained-v1.sh
      - name: Check retained single-container baseline evidence
        run: scripts/check-opentitan-pwm-single-container-results-v1.sh
      - name: Exercise proof-carrying MTBDD plant benchmark
        run: |
          scripts/benchmark-controller-proof-mtbdd-plant.sh \
            /tmp/controller-proof-mtbdd-plant.csv
          awk -F, 'NR == 2 { exit !($11 == "true" && $12 == "ok" && $8 > 0 && $9 > 0) }' \
            /tmp/controller-proof-mtbdd-plant.csv
      - name: Reproduce proof-carrying MTBDD self-service acceptance
        run: |
          scripts/run-controller-proof-mtbdd-self-service-acceptance.sh \
            target/debug/guarded-continuation-checker \
            /tmp/controller-proof-mtbdd-acceptance.csv
          diff -u results/controller-proof-mtbdd-self-service-acceptance-v1.csv \
            /tmp/controller-proof-mtbdd-acceptance.csv
      - name: Reproduce governed split-evidence acceptance
        run: |
          scripts/check-controller-split-compatibility-v1.sh \
            target/debug/guarded-continuation-checker
      - name: Reproduce governed split observability acceptance
        run: |
          shellcheck -s sh scripts/run-controller-split-observability-acceptance.sh
          scripts/run-controller-split-observability-acceptance.sh \
            target/debug/guarded-continuation-checker \
            /tmp/controller-split-observability-acceptance.csv
          diff -u results/controller-split-observability-acceptance-v1.csv \
            /tmp/controller-split-observability-acceptance.csv
      - name: Measure channel property process resources
        env:
          TRIALS: 3
        run: |
          cargo build --release --locked
          scripts/benchmark-btor2-channel-property-process-resources-v1.sh \
            target/release/guarded-continuation-checker \
            /tmp/channel-property-process-resources.csv
          awk -F, -v trials="$TRIALS" 'NR > 1 { if ($5 <= 0 || $6 != 1568 || $7 < $8 || $13 != 12 || $14 != "measured") exit 1; digest[$12]++; seen[$2]++ } END { exit !(seen["certify"] == trials && seen["verify"] == trials && length(digest) == 1) }' \
            /tmp/channel-property-process-resources.csv
          cat /tmp/channel-property-process-resources.csv
      - name: Measure channel trace process resources
        env:
          TRIALS: 3
        run: |
          scripts/benchmark-btor2-channel-trace-process-resources-v1.sh \
            target/release/guarded-continuation-checker \
            /tmp/channel-trace-process-resources.csv
          awk -F, -v trials="$TRIALS" 'NR > 1 { if ($5 <= 0 || $6 != 4899434 || $11 != 42 || $12 != "ok") exit 1; digest[$10]++; seen[$2]++ } END { exit !(seen["certify"] == trials && seen["verify"] == trials && length(digest) == 1) }' \
            /tmp/channel-trace-process-resources.csv
          cat /tmp/channel-trace-process-resources.csv
      - name: Reproduce channel trace self-service acceptance
        run: |
          shellcheck -s sh scripts/run-btor2-channel-trace-self-service-acceptance-v1.sh
          scripts/run-btor2-channel-trace-self-service-acceptance-v1.sh \
            target/release/guarded-continuation-checker \
            /tmp/channel-trace-self-service-acceptance.csv
          diff -u results/btor2-channel-trace-self-service-acceptance-v1.csv \
            /tmp/channel-trace-self-service-acceptance.csv
      - name: Exercise proof-carrying MTBDD whole-process comparison
        env:
          TRIALS: 3
        run: |
          cargo build --release --locked
          scripts/benchmark-controller-proof-mtbdd-process.sh \
            target/release/guarded-continuation-checker \
            /tmp/controller-proof-mtbdd-process.csv
          awk -F, -v trials="$TRIALS" 'NR > 1 { if ($8 != "true" || $9 != "ok" || $5 <= 0 || $6 <= 0) exit 1; seen[$2 ":" $3]++ } END { exit !(seen["compact:create"] == trials && seen["compact:verify"] == trials && seen["proof:create"] == trials && seen["proof:verify"] == trials) }' \
            /tmp/controller-proof-mtbdd-process.csv
          cat /tmp/controller-proof-mtbdd-process.csv
      - name: Measure proof-carrying MTBDD process resources
        env:
          TRIALS: 3
        run: |
          scripts/benchmark-controller-proof-mtbdd-resources.sh \
            target/release/guarded-continuation-checker \
            /tmp/controller-proof-mtbdd-resources.csv
          awk -F, -v trials="$TRIALS" 'NR > 1 { if ($5 <= 0 || $6 <= 0) exit 1; seen[$2 ":" $3]++ } END { exit !(seen["compact:create"] == trials && seen["compact:verify"] == trials && seen["proof:create"] == trials && seen["proof:verify"] == trials) }' \
            /tmp/controller-proof-mtbdd-resources.csv
          cat /tmp/controller-proof-mtbdd-resources.csv
      - name: Measure governed split-evidence process resources
        env:
          TRIALS: 3
        run: |
          scripts/benchmark-controller-split-process-resources.sh \
            target/release/guarded-continuation-checker \
            /tmp/controller-split-process-resources.csv
          awk -F, -v trials="$TRIALS" 'BEGIN { allowed["controller-certify"]=1; allowed["plant-door-certify"]=1; allowed["plant-lock-certify"]=1; allowed["governed-set-verify"]=1 } NR == 1 { expected="schema_version,operation,trial,elapsed_seconds,peak_rss_bytes,portable_evidence_bytes,time_backend,operating_system,architecture,answers_agree,status"; if ($0 != expected) exit 1; next } { if (!($2 in allowed) || $4 < 0 || $5 <= 0 || $6 <= 0 || $7 != "gnu" || $8 != "Linux" || $9 == "" || $10 != "true" || $11 != "ok") exit 1; seen[$2]++ } END { exit !(NR == 1 + (4 * trials) && seen["controller-certify"] == trials && seen["plant-door-certify"] == trials && seen["plant-lock-certify"] == trials && seen["governed-set-verify"] == trials) }' \
            /tmp/controller-split-process-resources.csv
          cat /tmp/controller-split-process-resources.csv
      - name: Cross-check BTOR2 model and witness with pinned BTOR2Tools
        run: |
          git init /tmp/btor2tools
          git -C /tmp/btor2tools remote add origin https://github.com/Boolector/btor2tools.git
          git -C /tmp/btor2tools fetch --depth 1 origin d33c73ff1d173f1bfac8ba6b1c6d68ba62c55f8e
          git -C /tmp/btor2tools checkout --detach FETCH_HEAD
          cmake -S /tmp/btor2tools -B /tmp/btor2tools/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/btor2tools/build --parallel 2
          cargo build --locked
          scripts/test-btor2tools-baseline.sh \
            target/debug/guarded-continuation-checker \
            /tmp/btor2tools/build/bin
      - name: Reproduce both-answer BTOR2 search cohort
        run: |
          scripts/run-btor2-search-cohort.sh \
            target/debug/guarded-continuation-checker /tmp/btor2-search.csv
          diff -u results/btor2-search-cohort-v1.csv /tmp/btor2-search.csv
      - name: Reproduce exact BTOR2 word-region cohort
        run: |
          scripts/run-btor2-region-cohort.sh \
            target/debug/guarded-continuation-checker /tmp/btor2-region.csv
          diff -u results/btor2-region-cohort-v1.csv /tmp/btor2-region.csv
      - name: Reproduce exact BTOR2 coupled-motion cohort
        run: |
          scripts/run-btor2-motion-cohort.sh \
            target/debug/guarded-continuation-checker /tmp/btor2-motion.csv
          diff -u results/btor2-motion-cohort-v1.csv /tmp/btor2-motion.csv
      - name: Reproduce BTOR2 motion self-service acceptance
        run: |
          scripts/run-btor2-motion-self-service-acceptance.sh \
            target/debug/guarded-continuation-checker /tmp/btor2-motion-acceptance.csv
          diff -u results/btor2-motion-self-service-acceptance-v1.csv \
            /tmp/btor2-motion-acceptance.csv
      - name: Reproduce exact BTOR2 braking-phase cohort
        run: |
          scripts/run-btor2-braking-cohort.sh \
            target/debug/guarded-continuation-checker /tmp/btor2-braking.csv
          diff -u results/btor2-braking-cohort-v1.csv /tmp/btor2-braking.csv
      - name: Reproduce BTOR2 braking self-service acceptance
        run: |
          scripts/run-btor2-braking-self-service-acceptance.sh \
            target/debug/guarded-continuation-checker /tmp/btor2-braking-acceptance.csv
          diff -u results/btor2-braking-self-service-acceptance-v1.csv \
            /tmp/btor2-braking-acceptance.csv
      - name: Reproduce source-separated BTOR2 component cohort
        run: |
          scripts/run-btor2-component-cohort.sh \
            target/debug/guarded-continuation-checker /tmp/btor2-component.csv
          diff -u results/btor2-component-cohort-v1.csv /tmp/btor2-component.csv
      - name: Reproduce BTOR2 component self-service acceptance
        run: |
          scripts/run-btor2-component-self-service-acceptance.sh \
            target/debug/guarded-continuation-checker /tmp/btor2-component-acceptance.csv
          diff -u results/btor2-component-self-service-acceptance-v1.csv \
            /tmp/btor2-component-acceptance.csv
      - name: Reproduce BTOR2 component batch acceptance
        run: |
          scripts/run-btor2-component-batch-acceptance.sh \
            target/debug/guarded-continuation-checker \
            /tmp/btor2-component-batch-acceptance.csv
          diff -u results/btor2-component-batch-acceptance-v1.csv \
            /tmp/btor2-component-batch-acceptance.csv
      - name: Test external production evidence gate
        run: scripts/test-external-evidence-register.sh
      - name: Production-evaluation qualification smoke test
        run: |
          cargo build --release --locked
          scripts/production-evaluation-check.sh \
            target/release/guarded-continuation-checker /tmp/cq-operations-check
      - name: Certified causal-analysis smoke test
        run: |
          target/release/guarded-continuation-checker \
            explain-aiger-counterexample \
            examples/products/infusion-pump/firmware/door-interlock-regression.aag \
            8 16 /tmp/cq-causal
          target/release/guarded-continuation-checker \
            verify-aiger-causal-bundle \
            examples/products/infusion-pump/firmware/door-interlock-regression.aag \
            /tmp/cq-causal
          grep -q '^minimality=1-minimal$' /tmp/cq-causal/causal-certificate.txt
          grep -q ',true,true,ok$' /tmp/cq-causal/causal-metrics.csv
          target/release/guarded-continuation-checker \
            verify-aiger-causal-bundle \
            examples/aiger/spi-bus-receive-e-08-bits.aag \
            results/causal-analysis-v1/spi
          target/release/guarded-continuation-checker \
            verify-aiger-causal-bundle \
            examples/products/infusion-pump/firmware/door-interlock-regression.aag \
            results/causal-analysis-v1/infusion-pump
          scripts/test-causal-strategy-results.sh \
            target/release/guarded-continuation-checker
      - name: Cross-check RTL examples with SymbiYosys
        working-directory: examples/products/infusion-pump/rtl
        run: |
          git init /tmp/sby
          git -C /tmp/sby remote add origin https://github.com/YosysHQ/sby.git
          git -C /tmp/sby fetch --depth 1 origin fea6e467d067b3ea84b6b5ac08cd48beb59f0d42
          git -C /tmp/sby checkout --detach FETCH_HEAD
          python3 /tmp/sby/sbysrc/sby.py -f -d /tmp/sby-safe safe-controller.sby
          python3 /tmp/sby/sbysrc/sby.py -f -d /tmp/sby-multimodule multimodule-controller.sby
          python3 /tmp/sby/sbysrc/sby.py -f -d /tmp/sby-project project/pump-system.sby
          python3 /tmp/sby/sbysrc/sby.py -f -d /tmp/sby-config-project config-project/memory-controller.sby
          python3 /tmp/sby/sbysrc/sby.py -f -d /tmp/sby-assumed door-interlock-assumed-safe.sby
          if python3 /tmp/sby/sbysrc/sby.py -f -d /tmp/sby-regression door-interlock-regression.sby; then
            echo "regressed controller unexpectedly passed SymbiYosys"
            exit 1
          fi
          test -f /tmp/sby-safe/PASS
          test -f /tmp/sby-multimodule/PASS
          test -f /tmp/sby-project/PASS
          test -f /tmp/sby-config-project/PASS
          test -f /tmp/sby-assumed/PASS
          test -f /tmp/sby-regression/FAIL

  portable-component-api:
    needs: changes
    if: needs.changes.outputs.full == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - name: Test portable component library and downstream API
        run: |
          cargo test --locked --lib btor2_component
          cargo test --locked --test btor2_component_api
          cargo test --locked --test opentitan_aon_watchdog_api
          cargo test --locked --lib btor2_predicate_set
          cargo test --locked --test btor2_predicate_set_api
          cargo test --locked --test revision_impact_api portable_certificate_fixture_has_frozen_identity_and_semantics
          cargo test --locked --features research-qatq-transport --test qatq_transport_api portable_fixture_has_frozen_envelope_identity
          cargo test --locked --test btor2_channel_trace_cli
          cargo test --release --locked --test btor2_channel_trace_monitor_api retained_open_titan_trace_cohort_agrees_with_direct_exact_queries

  revision-impact-public-release:
    needs: changes
    if: needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - name: Reproduce public multi-atom certificate in a release build
        run: cargo test --release --locked --test opentitan_pwm_revision_impact_api

  public-rtl-corpus:
    needs: changes
    if: needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install corpus tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools yosys z3 zstd
          git init /tmp/sby
          git -C /tmp/sby remote add origin https://github.com/YosysHQ/sby.git
          git -C /tmp/sby fetch --depth 1 origin fea6e467d067b3ea84b6b5ac08cd48beb59f0d42
          git -C /tmp/sby checkout --detach FETCH_HEAD
      - name: Build static corpus binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl
      - name: Run current distribution Yosys with independent oracle
        run: |
          scripts/run-rtl-corpus.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            corpus/rtl/yosys-simple /tmp/corpus-current /tmp/sby/sbysrc/sby.py
          cat /tmp/corpus-current/results.csv
      - name: Cross-check public controller compositions with SymbiYosys
        run: scripts/test-public-washing-controller-oracle.sh /tmp/sby/sbysrc/sby.py
      - name: Cross-check stateful physical-plant batch with SymbiYosys
        run: scripts/test-public-washing-controller-physical-oracle.sh /tmp/sby/sbysrc/sby.py
      - name: Build pinned Yosys for source attestation
        run: |
          sudo apt-get install --yes \
            bison flex gawk libffi-dev libreadline-dev pkg-config tcl-dev zlib1g-dev
          git init /tmp/yosys-attestation
          git -C /tmp/yosys-attestation remote add origin https://github.com/YosysHQ/yosys.git
          git -C /tmp/yosys-attestation fetch --depth 1 origin \
            b8e7da6f40ae8f552c116bf6c359b07c6533e159
          git -C /tmp/yosys-attestation checkout --detach FETCH_HEAD
          git -C /tmp/yosys-attestation submodule update --init --depth 1 -- \
            libs/cxxopts libs/fmt libs/tomlplusplus libs/boost_regex \
            libs/slang frontends/slang/lib
          cmake -S /tmp/yosys-attestation -B /tmp/yosys-attestation/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DYOSYS_CHECKOUT_INFO=b8e7da6f40ae8f552c116bf6c359b07c6533e159 \
            -DYOSYS_WITHOUT_ABC=ON
          cmake --build /tmp/yosys-attestation/build --parallel 2 --target yosys
      - name: Reproduce public source-to-model attestation
        run: |
          PATH="/tmp/yosys-attestation/build:$PATH" \
            scripts/test-source-model-provenance.sh \
            results/public-washing-source-model-attestation-v1.csv
          PATH="/tmp/yosys-attestation/build:$PATH" \
            scripts/test-composed-witness-plant-provenance-v1.sh
      - name: Reproduce OpenTitan AON watchdog acceptance
        run: |
          scripts/run-opentitan-aon-watchdog-acceptance.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/yosys-attestation/build/yosys \
            /tmp/opentitan-aon-watchdog-acceptance.csv
          diff -u results/opentitan-aon-watchdog-acceptance-v1.csv \
            /tmp/opentitan-aon-watchdog-acceptance.csv
      - name: Reproduce OpenTitan semantic revision acceptance
        run: |
          mkdir /tmp/opentitan-prim-count-revision-v1
          scripts/run-opentitan-prim-count-revision-v1.sh \
            /tmp/yosys-attestation/build/yosys \
            "$(command -v yosys-smtbmc)" \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/opentitan-prim-count-revision-v1.csv \
            /tmp/opentitan-prim-count-revision-amd64-v1.manifest.txt \
            /tmp/opentitan-prim-count-revision-v1
          diff -u results/opentitan-prim-count-revision-v1.csv \
            /tmp/opentitan-prim-count-revision-v1.csv
      - name: Qualify QatQ revision-batch transport resources
        env:
          TRIALS: 5
        run: |
          cargo build --release --locked --features research-qatq-transport \
            --example opentitan_prim_count_revision_batch \
            --example qatq_transport_qualification
          mkdir /tmp/qatq-transport-v1 /tmp/qatq-transport-v1/benchmark
          scripts/build-opentitan-prim-count-query-service-v1.sh \
            /tmp/yosys-attestation/build/yosys \
            /tmp/qatq-transport-v1/environment.btor2 \
            /tmp/qatq-transport-v1/before.btor2 \
            /tmp/qatq-transport-v1/after.btor2
          target/release/examples/opentitan_prim_count_revision_batch \
            /tmp/qatq-transport-v1/environment.btor2 \
            /tmp/qatq-transport-v1/before.btor2 \
            /tmp/qatq-transport-v1/after.btor2 \
            /tmp/qatq-transport-v1/revision.batch
          scripts/benchmark-qatq-transport-v1.sh \
            target/release/examples/qatq_transport_qualification \
            /tmp/qatq-transport-v1/results.csv \
            /tmp/qatq-transport-v1/resources.csv \
            /tmp/qatq-transport-v1/benchmark \
            revision-batch /tmp/qatq-transport-v1/revision.batch
          grep -q '^1,revision-batch,linux,x86_64,14164144,82428,82324,' \
            /tmp/qatq-transport-v1/results.csv
          grep -q ',cba7640709163f7d9ca5c908d87b2fb843f148dd0d514bfd345b188e640ca9c9,42f30367e3b1003bec6c95395d91b800a88eb76721fed9c46548a27f79dff6ee,true,true,116769,29.409347,measured$' \
            /tmp/qatq-transport-v1/results.csv
          awk -F, 'NR == 2 { exit !($2 == "revision-batch" && $5 > 0) }' \
            /tmp/qatq-transport-v1/resources.csv
          cat /tmp/qatq-transport-v1/results.csv
          cat /tmp/qatq-transport-v1/resources.csv
      - name: Prove OpenTitan verbatim-source equivalence
        run: |
          git init /tmp/opentitan-prim-count-verbatim
          git -C /tmp/opentitan-prim-count-verbatim remote add origin \
            https://github.com/lowRISC/opentitan.git
          git -C /tmp/opentitan-prim-count-verbatim fetch --depth 1 origin \
            34157c7afb84a7be7b1b1250d673f9fa8a3c18ce \
            369cffc85db0e6d5a667676a6f89987b94210e70
          git -C /tmp/opentitan-prim-count-verbatim worktree add --detach \
            /tmp/opentitan-prim-before 34157c7afb84a7be7b1b1250d673f9fa8a3c18ce
          git -C /tmp/opentitan-prim-count-verbatim worktree add --detach \
            /tmp/opentitan-prim-after 369cffc85db0e6d5a667676a6f89987b94210e70
          mkdir /tmp/opentitan-prim-count-equivalence-v1
          scripts/test-opentitan-prim-count-verbatim-equivalence-v1.sh \
            /tmp/yosys-attestation/build/yosys \
            /tmp/opentitan-prim-before /tmp/opentitan-prim-after \
            /tmp/opentitan-prim-count-verbatim-equivalence-v1.csv \
            /tmp/opentitan-prim-count-equivalence-v1
          diff -u results/opentitan-prim-count-verbatim-equivalence-v1.csv \
            /tmp/opentitan-prim-count-verbatim-equivalence-v1.csv
      - name: Reproduce Caliptra and Roa Logic PLIC search acceptance
        run: |
          cargo build --release --locked \
            --example roalogic_plic_revision_reuse \
            --example roalogic_plic_revision_cost
          scripts/run-caliptra-wdt-word-probe-v2.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/yosys-attestation/build/yosys \
            /tmp/caliptra-wdt-word-probe-v2.csv
          diff -u results/caliptra-wdt-word-probe-v2.csv \
            /tmp/caliptra-wdt-word-probe-v2.csv
          scripts/run-caliptra-wdt-word-input-acceptance-v1.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/yosys-attestation/build/yosys \
            "$(command -v yosys-smtbmc)" \
            /tmp/caliptra-wdt-word-input-acceptance-v1.csv
          diff -u results/caliptra-wdt-word-input-acceptance-v1.csv \
            /tmp/caliptra-wdt-word-input-acceptance-v1.csv
          scripts/run-roalogic-plic-gateway-acceptance-v1.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/yosys-attestation/build/yosys \
            "$(command -v yosys-smtbmc)" \
            /tmp/roalogic-plic-gateway-acceptance-v1.csv
          diff -u results/roalogic-plic-gateway-acceptance-v1.csv \
            /tmp/roalogic-plic-gateway-acceptance-v1.csv
          scripts/run-roalogic-plic-gateway-constrained-acceptance-v1.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/yosys-attestation/build/yosys \
            "$(command -v yosys-smtbmc)" \
            /tmp/roalogic-plic-gateway-constrained-acceptance-v1.csv
          diff -u results/roalogic-plic-gateway-constrained-acceptance-v1.csv \
            /tmp/roalogic-plic-gateway-constrained-acceptance-v1.csv
          mkdir /tmp/roalogic-plic-revision-work
          scripts/run-roalogic-plic-revision-reuse-v1.sh \
            /tmp/yosys-attestation/build/yosys \
            "$(command -v yosys-smtbmc)" \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/roalogic-plic-revision-reuse-v1.csv \
            /tmp/roalogic-plic-revision-work
          diff -u results/roalogic-plic-revision-reuse-v1.csv \
            /tmp/roalogic-plic-revision-reuse-v1.csv
          scripts/build-roalogic-plic-revision-aiger-v1.sh \
            /tmp/yosys-attestation/build/yosys \
            /tmp/roalogic-plic-revision-aiger-v1
          grep -q '^a18e30f70df2c716abcecc3e4fab96321bb5b6ea66246389a1df09a169adbce7  old-safe.aag$' \
            /tmp/roalogic-plic-revision-aiger-v1/SHA256SUMS
          grep -q '^354fa8eea1402249e520c96b603ca5fa20cd5fa6a2318639a23c2ad3d4b6a8b2  old-unsafe.aag$' \
            /tmp/roalogic-plic-revision-aiger-v1/SHA256SUMS
          target/release/examples/roalogic_plic_revision_cost \
            /tmp/roalogic-plic-revision-work/plic-new.btor2 \
            corpus/rtl/roalogic-plic-gateway/revision-cohort/monitor.btor2 \
            corpus/rtl/roalogic-plic-gateway/revision-cohort/monitor-v2.btor2 \
            corpus/rtl/roalogic-plic-gateway/revision-cohort/interface-retained-plic.txt \
            > /tmp/roalogic-plic-revision-cost-v1.csv
          grep -q '^1,21,525192,4100,4,1,1,.*true,true,measured$' \
            /tmp/roalogic-plic-revision-cost-v1.csv
          mkdir /tmp/roalogic-plic-revision-resources
          scripts/benchmark-roalogic-plic-revision-resources-v1.sh \
            /tmp/yosys-attestation/build/yosys \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/roalogic-plic-revision-resources-linux-v1.csv \
            /tmp/roalogic-plic-revision-resources 3
          test "$(wc -l < /tmp/roalogic-plic-revision-resources-linux-v1.csv)" -eq 13
          grep -q '^1,full-create,.*UNSAFE,2,0,measured$' \
            /tmp/roalogic-plic-revision-resources-linux-v1.csv
          grep -q '^1,retained-create,.*UNSAFE,1,1,measured$' \
            /tmp/roalogic-plic-revision-resources-linux-v1.csv
          grep -q '^1,full-verify,.*UNSAFE,2,0,measured$' \
            /tmp/roalogic-plic-revision-resources-linux-v1.csv
          grep -q '^1,retained-verify,.*UNSAFE,1,1,measured$' \
            /tmp/roalogic-plic-revision-resources-linux-v1.csv
      - name: Reproduce OpenTitan AON predicate-set acceptance
        run: |
          scripts/run-opentitan-aon-predicate-set-acceptance.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/yosys-attestation/build/yosys \
            /tmp/opentitan-aon-predicate-set-acceptance.csv
          diff -u results/opentitan-aon-predicate-set-acceptance-v2.csv \
            /tmp/opentitan-aon-predicate-set-acceptance.csv
      - name: Reproduce OpenTitan AON dual-timer structural probe
        run: |
          scripts/run-opentitan-aon-dual-timer-probe.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/yosys-attestation/build/yosys \
            /tmp/opentitan-aon-dual-timer-probe.csv
          diff -u results/opentitan-aon-dual-timer-probe-v1.csv \
            /tmp/opentitan-aon-dual-timer-probe.csv
      - name: Reproduce OpenTitan AON dual-timer predicate-set v3 acceptance
        run: |
          scripts/run-opentitan-aon-dual-timer-acceptance.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/yosys-attestation/build/yosys \
            /tmp/opentitan-aon-dual-timer-acceptance.csv
          diff -u results/opentitan-aon-dual-timer-acceptance-v1.csv \
            /tmp/opentitan-aon-dual-timer-acceptance.csv
      - name: Compare proof profile with maintained formal workflow
        env:
          TRIALS: 1
        run: |
          scripts/benchmark-controller-proof-mtbdd-maintained-baseline.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/sby/sbysrc/sby.py /tmp/controller-proof-maintained.csv
          awk -F, 'NR > 1 { if ($5 <= 0 || $6 <= 0 || $10 != "true" || $11 != "ok") exit 1; if ($2 == "proof" && $7 <= 0) exit 1; if ($2 == "maintained-formal" && $7 != 0) exit 1; seen[$2 ":" $3]++ } END { exit !(seen["proof:create"] == 1 && seen["proof:verify"] == 1 && seen["maintained-formal:oracle"] == 1) }' \
            /tmp/controller-proof-maintained.csv
          cat /tmp/controller-proof-maintained.csv
      - name: Reproduce controller MTBDD self-service acceptance
        run: |
          scripts/run-controller-mtbdd-self-service-acceptance.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/controller-mtbdd-acceptance.csv
          diff -u results/controller-mtbdd-self-service-acceptance-v1.csv \
            /tmp/controller-mtbdd-acceptance.csv
      - name: Reproduce controller plant exact portfolio acceptance
        run: |
          scripts/run-controller-plant-portfolio-acceptance.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/controller-plant-portfolio.csv
          diff -u results/controller-plant-portfolio-acceptance-v1.csv \
            /tmp/controller-plant-portfolio.csv
      - name: Reproduce governed controller plant acceptance
        run: |
          scripts/run-controller-plant-resource-acceptance.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/controller-plant-resource.csv
          diff -u results/controller-plant-resource-acceptance-v1.csv \
            /tmp/controller-plant-resource.csv
      - name: Reproduce governed proof portfolio acceptance
        run: |
          scripts/run-governed-proof-portfolio-acceptance.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/governed-proof-portfolio.csv
          diff -u results/governed-proof-mtbdd-portfolio-acceptance-linux-v1.csv \
            /tmp/governed-proof-portfolio.csv
      - name: Exercise controller plant phase observability
        env:
          TRIALS: 1
        run: |
          scripts/benchmark-controller-plant-portfolio-phases.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/controller-plant-phases.csv
          test "$(wc -l < /tmp/controller-plant-phases.csv)" -eq 5
      - name: Measure controller MTBDD process resources
        env:
          TRIALS: 1
        run: |
          scripts/benchmark-controller-mtbdd-process-resources.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            /tmp/sby/sbysrc/sby.py /tmp/controller-resources.csv
          awk -F, 'NR > 1 { if ($4 <= 0 || $5 <= 0) exit 1; seen[$2]++ } END { exit !(seen["gcc_produce"] == 1 && seen["gcc_verify"] == 1 && seen["symbiyosys_oracle"] == 1) }' \
            /tmp/controller-resources.csv
          cat /tmp/controller-resources.csv
      - name: Run pinned historical Yosys 0.36
        run: |
          docker run --rm \
            --volume "$PWD:/work" --workdir /work \
            hdlc/yosys@sha256:58c0c80e41fd96b4b90da53c730aa3c43051f0cf2a6c6e336bd012281479df22 \
            scripts/run-rtl-corpus.sh \
              target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
              corpus/rtl/yosys-simple /work/target/corpus-yosys-036 -
          cat target/corpus-yosys-036/results.csv
      - name: Exercise hostile-RTL isolation profile
        run: |
          set +e
          watchdog_output=$(CQ_ISOLATION_WATCHDOG_SELF_TEST=1 \
            scripts/isolated-rtl-evaluation.sh \
              target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
              corpus/rtl/yosys-simple/always01-safe.conf target/isolated-watchdog-test)
          watchdog_exit=$?
          set -e
          test "$watchdog_exit" -eq 2
          grep -qx 'isolation-watchdog-self-test=PASS' <<< "$watchdog_output"
          test ! -e target/isolated-watchdog-test
          test ! -e target/isolated-watchdog-test.isolation-report.txt
          scripts/isolated-rtl-evaluation.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            corpus/rtl/yosys-simple/always01-safe.conf target/isolated-safe
          set +e
          scripts/isolated-rtl-evaluation.sh \
            target/x86_64-unknown-linux-musl/release/guarded-continuation-checker \
            corpus/rtl/yosys-simple/always01-unsafe.conf target/isolated-unsafe
          unsafe_exit=$?
          set -e
          test "$unsafe_exit" -eq 1
          grep -qx 'runtime_probe=PASS' target/isolated-safe.isolation-report.txt
          grep -qx 'result=SAFE' target/isolated-safe.isolation-report.txt
          grep -qx 'runtime_probe=PASS' target/isolated-unsafe.isolation-report.txt
          grep -qx 'result=UNSAFE' target/isolated-unsafe.isolation-report.txt

  dependency-audit:
    needs: changes
    if: needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - name: Install pinned RustSec auditor
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Audit locked dependencies
        run: cargo audit

  public-api-semver:
    needs: changes
    if: needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - name: Install pinned public API checker
        run: cargo install cargo-semver-checks --version 0.49.0 --locked
      - name: Compare with the latest published crate
        run: scripts/check-public-api-semver-v1.sh

  bitwuzla-phase-baseline:
    needs: changes
    if: needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install maintained Bitwuzla build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes meson ninja-build pkg-config libgmp-dev libmpfr-dev
      - name: Build pinned Bitwuzla 0.9.1 and check phase endpoints
        run: |
          git init /tmp/bitwuzla
          git -C /tmp/bitwuzla remote add origin https://github.com/bitwuzla/bitwuzla.git
          git -C /tmp/bitwuzla fetch --depth 1 origin 8d1eb01093ae54d9b4586456b69c3bf31000a4c2
          git -C /tmp/bitwuzla checkout --detach FETCH_HEAD
          test "$(git -C /tmp/bitwuzla rev-parse HEAD)" = \
            8d1eb01093ae54d9b4586456b69c3bf31000a4c2
          cd /tmp/bitwuzla
          ./configure.py
          ninja -C build
          cd "$GITHUB_WORKSPACE"
          scripts/test-bitwuzla-phase-baseline.sh \
            /tmp/bitwuzla/build/src/main/bitwuzla

  reproducible-linux-bundle:
    needs: changes
    if: needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install deterministic packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools jq binutils shellcheck
      - name: Check packaging scripts
        run: |
          shellcheck -s sh \
            scripts/build-linux-evaluation-bundle.sh \
            scripts/build-linux-production-candidate.sh \
            scripts/generate-spdx-sbom.sh \
            scripts/test-linux-evaluation-bundle.sh \
            scripts/test-linux-production-candidate.sh \
            scripts/verify-linux-evaluation-bundle.sh
      - name: Rebuild twice, compare, verify, and reject tampering
        run: scripts/test-linux-evaluation-bundle.sh /tmp/gcc-linux-bundle-repro
      - name: Rebuild and verify the frozen production candidate twice
        run: scripts/test-linux-production-candidate.sh /tmp/gcc-linux-production-repro

  ci-gate:
    name: CI gate
    if: always()
    needs:
      - changes
      - documentation
      - certified-equivalent-evidence
      - test
      - portable-component-api
      - revision-impact-public-release
      - public-rtl-corpus
      - dependency-audit
      - public-api-semver
      - bitwuzla-phase-baseline
      - reproducible-linux-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Require every applicable check
        shell: bash
        env:
          FULL: ${{ needs.changes.outputs.full }}
          CHANGES: ${{ needs.changes.result }}
          DOCUMENTATION: ${{ needs.documentation.result }}
          CERTIFIED: ${{ needs.certified-equivalent-evidence.result }}
          TEST: ${{ needs.test.result }}
          PORTABLE: ${{ needs.portable-component-api.result }}
          REVISION: ${{ needs.revision-impact-public-release.result }}
          RTL: ${{ needs.public-rtl-corpus.result }}
          AUDIT: ${{ needs.dependency-audit.result }}
          SEMVER: ${{ needs.public-api-semver.result }}
          BITWUZLA: ${{ needs.bitwuzla-phase-baseline.result }}
          BUNDLE: ${{ needs.reproducible-linux-bundle.result }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          require_result() {
            local name=$1
            local actual=$2
            local expected=$3
            if [[ "$actual" != "$expected" ]]; then
              echo "$name result was $actual, expected $expected"
              exit 1
            fi
          }

          require_result changes "$CHANGES" success
          require_result documentation "$DOCUMENTATION" success

          expected=skipped
          if [[ "$FULL" == "true" ]]; then
            expected=success
          fi
          require_result test "$TEST" "$expected"
          require_result portable-component-api "$PORTABLE" "$expected"
          require_result revision-impact-public-release "$REVISION" "$expected"
          require_result public-rtl-corpus "$RTL" "$expected"
          require_result dependency-audit "$AUDIT" "$expected"
          require_result public-api-semver "$SEMVER" "$expected"
          require_result bitwuzla-phase-baseline "$BITWUZLA" "$expected"
          require_result reproducible-linux-bundle "$BUNDLE" "$expected"

          certified_expected=skipped
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$FULL" == "true" ]]; then
            certified_expected=success
          fi
          require_result certified-equivalent-evidence \
            "$CERTIFIED" "$certified_expected"
